<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Progress – Quant Reflex Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header><h1>📊 Progress</h1></header>

    <div class="card">
      <div class="stat-grid" id="statsGrid">
        <!-- populated by JS -->
      </div>
      <button id="resetBtn" class="btn" style="margin-top:1.25rem;">Reset Progress</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html"><span class="nav-icon">🏠</span>Home</a>
    <a href="practice.html"><span class="nav-icon">🎯</span>Practice</a>
    <a href="learn.html"><span class="nav-icon">📖</span>Learn</a>
    <a href="stats.html" class="active"><span class="nav-icon">📊</span>Stats</a>
    <a href="settings.html"><span class="nav-icon">⚙️</span>Settings</a>
  </nav>

  <script src="progress.js"></script>
  <script>
    function render() {
      var p = loadProgress();
      var accuracy = p.totalAttempted ? ((p.totalCorrect / p.totalAttempted) * 100).toFixed(1) : '0';
      document.getElementById('statsGrid').innerHTML =
        '<div class="stat-card"><div class="value">' + p.totalAttempted + '</div><div class="label">Questions Attempted</div></div>' +
        '<div class="stat-card"><div class="value">' + p.totalCorrect + '</div><div class="label">Correct Answers</div></div>' +
        '<div class="stat-card"><div class="value">' + accuracy + '%</div><div class="label">Accuracy</div></div>' +
        '<div class="stat-card"><div class="value">' + p.bestStreak + '</div><div class="label">Best Streak</div></div>' +
        '<div class="stat-card"><div class="value">' + (p.drillSessions || 0) + '</div><div class="label">Drill Sessions</div></div>';
    }
    render();
    document.getElementById('resetBtn').addEventListener('click', function () {
      if (confirm('Reset all progress?')) { resetProgress(); render(); }
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
