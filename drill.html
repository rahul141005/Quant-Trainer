<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#38bdf8" />
  <title>Reflex Drill – Quant Reflex Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Home</a>
    <header><h1>🧠 Reflex Drill</h1></header>

    <!-- Drill engine renders here -->
    <div id="drillContainer"></div>
  </div>

  <!-- Load modules in dependency order -->
  <script src="questions.js"></script>
  <script src="progress.js"></script>
  <script src="drill-engine.js"></script>
  <script>
    // Detect daily warmup mode via query string
    var isWarmup = new URLSearchParams(window.location.search).get('warmup') === '1';
    var engine = createDrillEngine(
      document.getElementById('drillContainer'),
      { count: 10, timeLimitSec: null }
    );
    if (isWarmup) {
      document.querySelector('header h1').textContent = '☀️ Daily Warmup';
    }
    engine.start();
  </script>
  <script src="app.js"></script>
</body>
</html>
