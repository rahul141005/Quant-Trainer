<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Practice – Quant Reflex Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header><h1>🎯 Practice</h1></header>

    <!-- Mode selection (shown initially) -->
    <div id="modeSelect">
      <div class="mode-card" data-mode="quick">
        <h3>⚡ Quick Drill</h3>
        <p>5 questions · No timer · Quick warmup</p>
      </div>

      <div class="mode-card" data-mode="reflex">
        <h3>🧠 Reflex Drill</h3>
        <p>10 questions · 15s per question · Train speed</p>
      </div>

      <div class="mode-card" data-mode="timed">
        <h3>⏱ Timed Test</h3>
        <p>10 questions · 3 min total · Exam pressure</p>
      </div>

      <div class="mode-card" data-mode="focus">
        <h3>🎯 Focus Training</h3>
        <p>10 questions · Choose a category</p>
      </div>
    </div>

    <!-- Category selection (shown when Focus Training is picked) -->
    <div id="categorySelect" style="display:none;">
      <h3 style="margin-bottom:.75rem;color:#0f172a;">Choose Category</h3>
      <div class="category-grid">
        <button class="category-btn" data-cat="squares">Squares</button>
        <button class="category-btn" data-cat="cubes">Cubes</button>
        <button class="category-btn" data-cat="percentages">Percentages</button>
        <button class="category-btn" data-cat="multiplication">Multiplication</button>
        <button class="category-btn" data-cat="fractions">Fractions</button>
        <button class="category-btn" data-cat="averages">Averages</button>
        <button class="category-btn" data-cat="ratios">Ratios</button>
        <button class="category-btn" data-cat="profit-loss">Profit & Loss</button>
        <button class="category-btn" data-cat="time-speed-distance">Time Speed Dist</button>
      </div>
      <button class="btn" id="backToModes" style="margin-top:1rem;">← Back</button>
    </div>

    <!-- Drill engine renders here -->
    <div id="drillContainer"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html"><span class="nav-icon">🏠</span>Home</a>
    <a href="practice.html" class="active"><span class="nav-icon">🎯</span>Practice</a>
    <a href="learn.html"><span class="nav-icon">📖</span>Learn</a>
    <a href="stats.html"><span class="nav-icon">📊</span>Stats</a>
    <a href="settings.html"><span class="nav-icon">⚙️</span>Settings</a>
  </nav>

  <!-- Load modules in dependency order -->
  <script src="questions.js"></script>
  <script src="progress.js"></script>
  <script src="drill-engine.js"></script>
  <script>
    (function () {
      var modeSelect = document.getElementById('modeSelect');
      var categorySelect = document.getElementById('categorySelect');
      var drillContainer = document.getElementById('drillContainer');

      /* Mode configurations */
      var modes = {
        quick:  { count: 5,  timeLimitSec: null, perQuestionSec: null, category: null, mode: '⚡ Quick Drill' },
        reflex: { count: 10, timeLimitSec: null, perQuestionSec: 15,   category: null, mode: '🧠 Reflex Drill' },
        timed:  { count: 10, timeLimitSec: 180,  perQuestionSec: null, category: null, mode: '⏱ Timed Test' },
        focus:  { count: 10, timeLimitSec: null, perQuestionSec: null, category: null, mode: '🎯 Focus Training' }
      };

      function startDrill(config) {
        modeSelect.style.display = 'none';
        categorySelect.style.display = 'none';
        drillContainer.style.display = 'block';
        var engine = createDrillEngine(drillContainer, config);
        engine.start();
      }

      /* Mode card clicks */
      var modeCards = document.querySelectorAll('.mode-card');
      for (var i = 0; i < modeCards.length; i++) {
        modeCards[i].addEventListener('click', function () {
          var modeKey = this.getAttribute('data-mode');
          if (modeKey === 'focus') {
            modeSelect.style.display = 'none';
            categorySelect.style.display = 'block';
          } else {
            startDrill(modes[modeKey]);
          }
        });
      }

      /* Category button clicks */
      var catBtns = document.querySelectorAll('.category-btn');
      for (var j = 0; j < catBtns.length; j++) {
        catBtns[j].addEventListener('click', function () {
          var cat = this.getAttribute('data-cat');
          var config = Object.assign({}, modes.focus);
          config.category = cat;
          config.mode = '🎯 ' + this.textContent;
          startDrill(config);
        });
      }

      /* Back button */
      document.getElementById('backToModes').addEventListener('click', function () {
        categorySelect.style.display = 'none';
        modeSelect.style.display = 'block';
      });
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
